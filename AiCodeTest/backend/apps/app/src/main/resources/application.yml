spring:
  application:
    name: AiCodeTest
  profiles:
    active: dev
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.jdbc.JdbcRepositoriesAutoConfiguration

cors:
  allowed-origins: http://localhost:3000

mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  type-aliases-package: com.dit.auth.domain,com.dit.menu.domain,com.dit.user.domain,com.dit.common.exception,com.dit.language.dto
  configuration:
    # 스네이크케이스 컬럼명 → 카멜케이스 프로퍼티명 자동 매핑
    map-underscore-to-camel-case: true
    lazy-loading-enabled: true
    default-executor-type: REUSE
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

server:
  port: 8080
  servlet:
    context-path: /

# MES 서버 연동 정보 (참고용)
mes:
  server:
    bridge-url: http://localhost:18080/
    proxy-url: http://localhost:60100/WebProxy.asmx

