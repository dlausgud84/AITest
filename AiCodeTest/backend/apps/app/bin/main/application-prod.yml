spring:
  datasource:
    # Microsoft SQL Server 운영 환경 연결
    # 운영 배포 전 실제 서버 정보로 변경할 것
    url: jdbc:sqlserver://${DB_HOST:localhost}:1433;databaseName=${DB_NAME:MESDB};encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

logging:
  level:
    root: WARN
    com.dit: INFO
    org.springframework.web: WARN
    org.mybatis: WARN
